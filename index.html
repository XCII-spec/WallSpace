<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WallSpace</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#2563eb33,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 25%),
    #050816;
    overflow-x:hidden;
    color:white;
}

/* PARTICLES */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:radial-gradient(white 1px,transparent 1px);
    background-size:40px 40px;
    opacity:0.08;
    animation:moveBg 20s linear infinite;
    z-index:0;
}

@keyframes moveBg{
    from{transform:translateY(0);}
    to{transform:translateY(-40px);}
}

/* HEADER */
header{
    width:100%;
    padding:25px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:fixed;
    top:0;
    z-index:100;
    backdrop-filter:blur(12px);
    background:rgba(0,0,0,0.2);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.logo{
    font-size:30px;
    font-weight:700;
    background:linear-gradient(90deg,#38bdf8,#8b5cf6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

nav{
    display:flex;
    gap:25px;
}

nav a{
    color:#dbeafe;
    text-decoration:none;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* HERO */
.hero{
    padding:140px 8% 60px;
    text-align:center;
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:65px;
    line-height:1.1;
}

.gradient{
    background:linear-gradient(90deg,#38bdf8,#8b5cf6,#ec4899);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:20px;
    color:#cbd5e1;
    font-size:18px;
}

/* GALLERY */
.gallery{
    margin-top:60px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-content{
    padding:12px;
    text-align:center;
}

.download{
    display:block;
    margin-top:10px;
    padding:10px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background:linear-gradient(90deg,#2563eb,#7c3aed);
    transition:0.3s;
}

.download:hover{
    transform:scale(1.03);
}

/* RESPONSIVE */
@media(max-width:700px){
    .hero h1{
        font-size:45px;
    }
}

</style>
</head>

<body>

<header>
    <div class="logo">WallSpace</div>
    <nav>
        <a href="#">Accueil</a>
        <a href="#">Catégories</a>
        <a href="#">Upload</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">

    <h1>
        Télécharge gratuitement des <span class="gradient">fonds d’écran</span> stylés
    </h1>

    <p>
        Une collection premium de wallpapers HD gratuits pour ton téléphone et PC.
    </p>
<section>
  
  <h2>Wallapers</h2>
    <div class="gallery">

        <div class="card">
            <img src="wallapers/1.jpg">
            <div class="card-content">
                <p>Miami</p>
                <a class="download" href="wallapers/1.jpg" download>Télécharger</a>
            </div>
        </div>

        <div class="card">
            <img src="wallapers/2.jpg">
            <div class="card-content">
                <p>Cyber Space</p>
                <a class="download" href="wallapers/2.jpg" download>Télécharger</a>
            </div>
        </div>

        <div class="card">
            <img src="wallapers/3.jpg">
            <div class="card-content">
                <p>Ferrari</p>
                <a class="download" href="wallapers/3.jpg" download>Télécharger</a>
            </div>
        </div>

    </div>
  <div class="card">
    <img src="wallapers/4.jpg">
    <div class="card-content">
      <p>Supercar</p>
      <a class="download"
         href="wallapers/4.jpg"
         download>Télécharger</a>
    </div>
  </div>
    <div class="card">
      <img src="wallapers.jpg">
      <div class="card-content">
        <p>Drift car</p>
        <a class="download"
           href="wallapers/5.jpg"
           download>Télécharger</a>
      </div>
    

</section>

</body>
</html>
